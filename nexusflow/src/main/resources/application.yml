spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusflow
    username: ${DB_USERNAME:nexusflow}
    password: ${DB_PASSWORD:nexusflow123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  messages:
    basename: messages
    encoding: UTF-8
    use-code-as-default-message: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  web:
    resources:
      static-locations: classpath:/static/

server:
  port: ${PORT:9090}
  servlet:
    context-path: /
    session:
      timeout: 30m
  error:
    include-message: always

logging:
  level:
    com.nexusflow: DEBUG
    org.springframework.security: INFO
