<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="'Login — ' + #{app.name}">Login — NexusFlow</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <script>if(localStorage.getItem('nf-theme')==='light')document.documentElement.classList.add('light')</script>
</head>
<body>
<div class="login-wrap">
  <div class="login-card fade-in">

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div class="login-logo">Nexus<span>Flow</span></div>
      <div style="display:flex;gap:6px">
        <button id="themeToggle" class="theme-btn">🌙</button>
      </div>
    </div>
    <div class="login-sub" th:text="#{auth.tagline}">Gestão financeira para comércios</div>

    <div th:if="${errorMsg}" class="alert alert-danger" data-auto-dismiss>
      ⚠️ <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>
      ✅ <span th:text="${successMsg}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label" th:text="#{auth.email}">E-mail</label>
        <input type="email" name="email" class="form-control"
               placeholder="seu@email.com" autocomplete="email" required/>
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label" th:text="#{auth.password}">Senha</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-w" th:text="#{auth.login}">Entrar →</button>
    </form>

    <div class="login-divider" style="margin-top:28px" th:text="#{auth.demo}">Acesso demo</div>
    <div style="background:var(--surface2);border-radius:10px;padding:14px 16px;font-size:12px;color:var(--muted)">
      <div><strong style="color:var(--text)" th:text="#{auth.demo.developer} + ':'">Developer:</strong> superadmin@nexusflow.com / super123</div>
      <div style="margin-top:4px"><strong style="color:var(--text)" th:text="#{auth.demo.manager} + ':'">Gerente:</strong> carlos@nexusflow.com / manager123</div>
      <div style="margin-top:4px"><strong style="color:var(--text)" th:text="#{auth.demo.employee} + ':'">Funcionário:</strong> ana@nexusflow.com / emp123</div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
