<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.fillForm}, content=~{::content})}">
<content>

<div th:if="${errorMsg}" class="alert alert-danger" data-auto-dismiss>⚠️ <span th:text="${errorMsg}"></span></div>

<div class="card fade-in">
  <div class="card-head">
    <div>
      <div class="card-title" th:text="${template.name}"></div>
      <div class="text-muted" style="font-size:13px" th:text="${template.description ?: ''}"></div>
    </div>
  </div>
  <div class="card-body">
    <form th:action="@{/employee/forms/{id}/fill(id=${template.id})}" method="post"
          th:object="${form}" enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div style="background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:20px">
        <div class="fw-bold" style="margin-bottom:12px;font-size:13px;color:var(--muted)"
             th:text="#{employee.formFill.serviceData}">DADOS DO SERVIÇO</div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" th:text="#{employee.formFill.value}">📈 Valor do Serviço (R$)</label>
            <input type="number" step="0.01" min="0" th:field="*{serviceValue}" class="form-control"
                   th:classappend="${#fields.hasErrors('serviceValue')} ? 'is-invalid'"
                   placeholder="0,00"/>
            <div th:if="${#fields.hasErrors('serviceValue')}" class="form-error" th:errors="*{serviceValue}"></div>
          </div>
          <div class="form-group">
            <label class="form-label" th:text="#{employee.formFill.hours}">⏱ Horas do Serviço</label>
            <input type="number" step="0.01" min="0" th:field="*{serviceHours}" class="form-control"
                   th:classappend="${#fields.hasErrors('serviceHours')} ? 'is-invalid'"
                   placeholder="0,00"/>
            <div th:if="${#fields.hasErrors('serviceHours')}" class="form-error" th:errors="*{serviceHours}"></div>
          </div>
          <div class="form-group">
            <label class="form-label" th:text="#{employee.formFill.date}">📅 Data de Ocorrência</label>
            <input type="text" th:field="*{occurrenceDate}" class="form-control"
                   th:classappend="${#fields.hasErrors('occurrenceDate')} ? 'is-invalid'"
                   placeholder="dd/mm/aaaa" maxlength="10" autocomplete="off"/>
            <div th:if="${#fields.hasErrors('occurrenceDate')}" class="form-error" th:errors="*{occurrenceDate}"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" th:text="#{employee.formFill.notes}">📝 Observações (opcional)</label>
          <textarea th:field="*{notes}" class="form-control" rows="3"
                    placeholder="..."></textarea>
        </div>
      </div>

      <div th:if="${!#lists.isEmpty(template.fields)}"
           style="background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:20px">
        <div class="fw-bold" style="margin-bottom:12px;font-size:13px;color:var(--muted)"
             th:text="#{employee.formFill.customData}">CAMPOS PERSONALIZADOS</div>

        <div th:each="field, stat : ${template.fields}" class="form-group">
          <input type="hidden" th:name="${'responses[' + stat.index + '].fieldId'}"
                 th:value="${field.id}"/>

          <label class="form-label">
            <span th:text="${field.label}"></span>
            <span th:if="${field.required}" class="text-red"> *</span>
          </label>

          <input th:if="${field.fieldType.name() == 'TEXT'}"
                 type="text" class="form-control"
                 th:name="${'responses[' + stat.index + '].response'}"
                 th:value="${form.responses != null and #lists.size(form.responses) > stat.index ? form.responses[stat.index].response : ''}"/>

          <textarea th:if="${field.fieldType.name() == 'TEXTAREA'}"
                    class="form-control" rows="3"
                    th:name="${'responses[' + stat.index + '].response'}"
                    th:text="${form.responses != null and #lists.size(form.responses) > stat.index ? form.responses[stat.index].response : ''}"></textarea>

          <input th:if="${field.fieldType.name() == 'NUMBER'}"
                 type="number" step="any" class="form-control"
                 th:name="${'responses[' + stat.index + '].response'}"
                 th:value="${form.responses != null and #lists.size(form.responses) > stat.index ? form.responses[stat.index].response : ''}"/>

          <input th:if="${field.fieldType.name() == 'DATE'}"
                 type="date" class="form-control"
                 th:name="${'responses[' + stat.index + '].response'}"
                 th:value="${form.responses != null and #lists.size(form.responses) > stat.index ? form.responses[stat.index].response : ''}"/>

          <select th:if="${field.fieldType.name() == 'SELECT'}"
                  class="form-control"
                  th:name="${'responses[' + stat.index + '].response'}">
            <option value="">...</option>
            <option th:each="opt : ${field.optionsArray}"
                    th:value="${opt}" th:text="${opt}"></option>
          </select>

          <div th:if="${field.fieldType.name() == 'RADIO'}"
               style="display:flex;flex-direction:column;gap:4px">
            <label th:each="opt : ${field.optionsArray}"
                   style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer">
              <input type="radio"
                     th:name="${'responses[' + stat.index + '].response'}"
                     th:value="${opt}"
                     style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary);flex-shrink:0"/>
              <span th:text="${opt}"></span>
            </label>
          </div>

          <input th:if="${field.fieldType.name() == 'FILE'}"
                 type="file"
                 th:name="${'file_' + field.id}"
                 class="form-control"
                 accept=".pdf,image/*"
                 th:required="${field.required}"/>

          <div th:if="${field.fieldType.name() == 'CHECKBOX'}"
               class="chk-group"
               th:attr="data-target=${'chkHidden_' + stat.index}"
               style="display:flex;flex-direction:column;gap:4px">
            <input type="hidden"
                   th:id="${'chkHidden_' + stat.index}"
                   th:name="${'responses[' + stat.index + '].response'}"
                   value=""/>
            <label th:each="opt : ${field.optionsArray}"
                   style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer">
              <input type="checkbox"
                     class="chk-item"
                     th:value="${opt}"
                     style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary);flex-shrink:0"/>
              <span th:text="${opt}"></span>
            </label>
          </div>

        </div>
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button type="submit" class="btn btn-primary" th:text="#{employee.formFill.submit}">✅ Enviar Registro</button>
        <button th:if="${!#lists.isEmpty(template.fields)}"
                type="submit"
                th:formaction="@{/employee/forms/{id}/draft(id=${template.id})}"
                class="btn btn-outline">
          🔗 Gerar link para cliente preencher
        </button>
        <a th:href="@{/employee/forms}" class="btn btn-outline" th:text="#{btn.cancel}">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<script>
(function(){
  var dateInput = document.getElementById('occurrenceDate');
  if (dateInput) {
    dateInput.addEventListener('input', function(e) {
      var digits = e.target.value.replace(/\D/g, '').substring(0, 8);
      var out = digits;
      if (digits.length > 2) out = digits.substring(0,2) + '/' + digits.substring(2);
      if (digits.length > 4) out = digits.substring(0,2) + '/' + digits.substring(2,4) + '/' + digits.substring(4);
      e.target.value = out;
    });
  }

  document.querySelectorAll('.chk-group').forEach(function(group) {
    var hidden = document.getElementById(group.getAttribute('data-target'));
    group.querySelectorAll('.chk-item').forEach(function(chk) {
      chk.addEventListener('change', function() {
        hidden.value = Array.from(group.querySelectorAll('.chk-item:checked'))
          .map(function(c){ return c.value; }).join(', ');
      });
    });
  });
})();
</script>

</content>
</th:block>
</body>
</html>
