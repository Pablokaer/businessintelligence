<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.history}, content=~{::content})}">
<content>

<div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>✅ <span th:text="${successMsg}"></span></div>

<div class="section-header">
  <div class="section-title" th:text="#{employee.submissions.title}">Meus Formulários</div>
  <a th:href="@{/employee/submissions/new}" class="btn btn-primary btn-sm" th:text="#{btn.newRecord}">+ Novo</a>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th th:text="#{lbl.number}">Nº</th>
        <th th:text="#{lbl.type}">Tipo</th>
        <th th:text="#{lbl.description}">Descrição</th>
        <th th:text="#{lbl.value}">Valor</th>
        <th th:text="#{lbl.hours}">Horas</th>
        <th th:text="#{lbl.date}">Data</th>
        <th th:text="#{lbl.status}">Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr th:if="${page.empty}">
        <td colspan="8">
          <div class="empty">
            <div class="empty-icon">📝</div>
            <div class="empty-text" th:text="#{employee.submissions.noRecords}">Você ainda não tem registros</div>
            <div style="margin-top:14px">
              <a th:href="@{/employee/submissions/new}" class="btn btn-primary btn-sm" th:text="#{btn.createNow}">Criar agora</a>
            </div>
          </div>
        </td>
      </tr>
      <tr th:each="s : ${page.content}">
        <td class="td-mono" th:text="${s.formNumber}">F-0001</td>
        <td>
          <span th:class="'badge badge-' + ${s.type.badgeClass}"
                th:text="${s.type.icon} + ' ' + ${s.type.label}"></span>
        </td>
        <td class="text-muted" th:text="${#strings.abbreviate(s.description, 40)}">desc</td>
        <td th:class="${s.type.name() == 'EXPENSE'} ? 'fw-bold text-red' : 'fw-bold text-green'"
            th:text="${#numbers.formatCurrency(s.value)}">0,00 €</td>
        <td class="text-muted" th:text="${s.hours} + 'h'">0h</td>
        <td class="text-muted" th:text="${#temporals.format(s.occurrenceDate,'dd/MM/yy')}"></td>
        <td>
          <span th:class="'badge badge-' + ${s.status.badgeClass}" th:text="${s.status.label}"></span>
        </td>
        <td>
          <a th:href="@{/employee/submissions/{id}(id=${s.id})}"
             class="btn btn-ghost btn-sm" th:text="#{btn.view}">Ver</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div th:if="${page.totalPages > 1}" class="pagination">
  <a th:href="@{/employee/submissions(page=${page.number - 1})}"
     th:class="${page.first} ? 'page-btn disabled' : 'page-btn'">‹</a>
  <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
    <a th:href="@{/employee/submissions(page=${i})}"
       th:class="${i == page.number} ? 'page-btn active' : 'page-btn'"
       th:text="${i + 1}"></a>
  </th:block>
  <a th:href="@{/employee/submissions(page=${page.number + 1})}"
     th:class="${page.last} ? 'page-btn disabled' : 'page-btn'">›</a>
</div>

</content>
</th:block>
</body>
</html>
