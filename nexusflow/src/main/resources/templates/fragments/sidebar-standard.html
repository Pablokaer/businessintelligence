<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="sidebar" id="sidebar" class="sidebar">
  <div class="sidebar-logo">Nexus<span>Flow</span></div>

  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <a th:href="@{/employee/dashboard}"
       th:classappend="${activeMenu == 'dashboard'} ? 'active'" class="nav-item">
      <div class="nav-icon">🏠</div> <span>Home</span>
    </a>
    <a th:href="@{/employee/forms}"
       th:classappend="${activeMenu == 'forms'} ? 'active'" class="nav-item">
      <div class="nav-icon">✏️</div> <span>Fill Form</span>
    </a>
    <a th:href="@{/employee/form-submissions}"
       th:classappend="${activeMenu == 'form-submissions'} ? 'active'" class="nav-item">
      <div class="nav-icon">📋</div> <span>My Records</span>
    </a>
    <a th:href="@{/employee/submissions}"
       th:classappend="${activeMenu == 'submissions'} ? 'active'" class="nav-item">
      <div class="nav-icon">📁</div> <span>History</span>
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" th:text="${#authentication?.principal?.initials}">XX</div>
      <div>
        <div class="user-name" th:text="${#authentication?.principal?.name}">User</div>
        <div class="user-role">Employee</div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin-left:auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn" title="Sair">⏻</button>
      </form>
    </div>
  </div>
</nav>
</html>
