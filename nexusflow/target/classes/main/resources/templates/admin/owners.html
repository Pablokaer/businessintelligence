<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.owners}, content=~{::content})}">
<content>

<div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>✅ <span th:text="${successMsg}"></span></div>
<div th:if="${errorMsg}"   class="alert alert-danger"  data-auto-dismiss>⚠️ <span th:text="${errorMsg}"></span></div>

<div class="grid-2" style="align-items:start">

  <div class="card fade-in">
    <div class="card-head">
      <div class="card-title" th:text="#{admin.owners.title}">Owners cadastrados</div>
      <span class="badge badge-primary" th:text="${#lists.size(owners)} + ' ' + #{lbl.records}"></span>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(owners)}" class="empty">
        <div class="empty-icon">👑</div>
        <div class="empty-text" th:text="#{admin.owners.none}">Nenhum owner ainda</div>
      </div>
      <div th:each="o : ${owners}"
           style="display:flex;align-items:start;gap:12px;padding:16px 0;border-bottom:1px solid var(--border)">
        <div class="avatar" th:text="${o.initials}"
             th:style="${!o.active} ? 'opacity:0.45' : ''">XX</div>
        <div style="flex:1">
          <div class="fw-bold" th:text="${o.name}"></div>
          <div class="text-muted" style="font-size:12px" th:text="${o.comercio}"></div>
          <div class="text-muted" style="font-size:11px" th:text="${o.email}"></div>
          <span th:if="${!o.active}" class="badge badge-warning" style="margin-top:4px">Bloqueado</span>
          <form th:action="@{/admin/owners/{id}/password(id=${o.id})}" method="post"
                style="display:flex;gap:6px;margin-top:8px">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="password" name="newPassword" class="form-control" style="font-size:12px;padding:4px 8px"
                   placeholder="Nova senha" minlength="4" maxlength="60" required/>
            <button type="submit" class="btn btn-secondary" style="font-size:12px;padding:4px 10px;white-space:nowrap">
              Alterar senha
            </button>
          </form>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <span class="badge badge-danger">👑 Owner</span>
          <form th:action="@{/admin/owners/{id}/toggle(id=${o.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    th:class="${o.active} ? 'btn btn-warning' : 'btn btn-success'"
                    style="font-size:12px;padding:4px 10px"
                    th:text="${o.active} ? 'Bloquear' : 'Desbloquear'">
              Bloquear
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="card fade-in d2">
    <div class="card-head">
      <div class="card-title" th:text="#{admin.owners.new}">Criar novo Owner</div>
    </div>
    <div class="card-body">
      <form th:action="@{/admin/owners}" method="post" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input type="text" th:field="*{name}" class="form-control"
                 th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                 placeholder="João Silva"/>
          <div th:if="${#fields.hasErrors('name')}" class="form-error" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Nome do comércio</label>
          <input type="text" id="comercioInput" th:field="*{comercio}" class="form-control"
                 th:classappend="${#fields.hasErrors('comercio')} ? ' is-invalid'"
                 placeholder="Padaria do João"/>
          <div th:if="${#fields.hasErrors('comercio')}" class="form-error" th:errors="*{comercio}"></div>
        </div>

        <div class="form-group">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <input type="checkbox" id="useCustomSlugCheck" th:field="*{useCustomSlug}"
                   style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary)"/>
            <label for="useCustomSlugCheck" class="form-label" style="margin:0;cursor:pointer">
              Nome curto do comércio
              <span class="text-muted" style="font-size:11px;font-weight:400">— personalizar domínio do e-mail</span>
            </label>
          </div>
          <input type="text" id="comercioSlugInput" th:field="*{comercioSlug}" class="form-control"
                 th:classappend="${#fields.hasErrors('comercioSlug')} ? ' is-invalid'"
                 placeholder="padariodojoao"
                 th:disabled="${!form.useCustomSlug}"/>
          <div th:if="${#fields.hasErrors('comercioSlug')}" class="form-error" th:errors="*{comercioSlug}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">E-mail de acesso</label>
          <div style="display:flex;align-items:center">
            <input type="text" id="emailPrefixInput" th:field="*{emailPrefix}" class="form-control"
                   th:classappend="${#fields.hasErrors('emailPrefix')} ? ' is-invalid'"
                   placeholder="joao"
                   style="border-radius:10px 0 0 10px;border-right:none;flex:1"/>
            <span id="emailSuffix"
                  style="background:var(--surface2);border:1px solid var(--border);border-left:none;border-radius:0 10px 10px 0;padding:0 12px;height:42px;display:flex;align-items:center;font-size:13px;color:var(--muted);white-space:nowrap">
              @comercio.com
            </span>
          </div>
          <div th:if="${#fields.hasErrors('emailPrefix')}" class="form-error" th:errors="*{emailPrefix}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Senha inicial</label>
          <input type="password" th:field="*{password}" class="form-control"
                 th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                 placeholder="Mínimo 4 caracteres"/>
          <div th:if="${#fields.hasErrors('password')}" class="form-error" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-w" th:text="#{admin.owners.create}">👑 Criar Owner</button>
      </form>
    </div>
  </div>

</div>

<script>
(function() {
  var comercioEl = document.getElementById('comercioInput');
  var checkEl    = document.getElementById('useCustomSlugCheck');
  var slugEl     = document.getElementById('comercioSlugInput');
  var suffixEl   = document.getElementById('emailSuffix');

  function slugify(text) {
    return text
      .normalize('NFD')
      .replace(/[̀-ͯ]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]/g, '');
  }

  function updateSuffix() {
    var val = checkEl.checked && slugEl.value.trim()
      ? slugEl.value.trim()
      : slugify(comercioEl.value);
    suffixEl.textContent = val ? '@' + val + '.com' : '@comercio.com';
  }

  function onCheckChange() {
    var checked = checkEl.checked;
    slugEl.disabled = !checked;
    if (checked && slugEl.value.trim() === '') {
      slugEl.value = slugify(comercioEl.value);
    }
    updateSuffix();
  }

  slugEl.addEventListener('input', function() {
    slugEl.value = slugEl.value.toLowerCase().replace(/[^a-z0-9]/g, '');
    updateSuffix();
  });

  comercioEl.addEventListener('input', updateSuffix);
  checkEl.addEventListener('change', onCheckChange);

  onCheckChange();
})();
</script>

</content>
</th:block>
</body>
</html>
