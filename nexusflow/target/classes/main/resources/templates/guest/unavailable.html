<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário indisponível</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
           padding: 32px 16px; background: var(--bg, #f1f5f9); }
    .wrap { width: 100%; max-width: 440px; text-align: center; padding: 48px 32px; }
  </style>
</head>
<body>

<div class="card wrap">
  <div style="font-size:52px;margin-bottom:16px">🔒</div>
  <h2 style="margin:0 0 10px">Formulário indisponível</h2>
  <p style="color:var(--muted);font-size:14px;margin:0"
     th:text="${reason ?: 'Este link não está mais disponível.'}">
    Este link não está mais disponível.
  </p>
  <div style="margin-top:32px;font-size:12px;color:var(--muted)">
    Gerado pelo sistema NexusFlow
  </div>
</div>

</body>
</html>
