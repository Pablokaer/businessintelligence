<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.reports}, content=~{::content})}">
<content>

<div class="card" style="margin-bottom:20px">
  <div class="card-body" style="padding:16px 20px">
    <form th:action="@{/manager/reports}" method="get"
          style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div class="form-group" style="margin:0">
        <label class="form-label" th:text="#{lbl.start}">Data inicial</label>
        <input type="date" name="from" class="form-control"
               th:value="${#temporals.format(from,'yyyy-MM-dd')}"/>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label" th:text="#{lbl.end}">Data final</label>
        <input type="date" name="to" class="form-control"
               th:value="${#temporals.format(to,'yyyy-MM-dd')}"/>
      </div>
      <button type="submit" class="btn btn-primary" th:text="#{btn.generate}">Gerar</button>
      <a th:href="@{/manager/reports}" class="btn btn-ghost" th:text="#{btn.currentMonth}">Mês atual</a>
    </form>
  </div>
</div>

<div class="stats-grid" style="margin-bottom:20px">
  <div class="stat-card">
    <div class="stat-icon">💰</div>
    <div class="stat-label" th:text="#{kpi.sales}">Vendas</div>
    <div class="stat-value text-green" th:text="${#numbers.formatCurrency(summary.totalSales)}">0,00 €</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🔧</div>
    <div class="stat-label" th:text="#{kpi.services}">Serviços</div>
    <div class="stat-value text-blue" th:text="${#numbers.formatCurrency(summary.totalServices)}">0,00 €</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📤</div>
    <div class="stat-label" th:text="#{kpi.expenses}">Despesas</div>
    <div class="stat-value text-red" th:text="${#numbers.formatCurrency(summary.totalExpenses)}">0,00 €</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📈</div>
    <div class="stat-label" th:text="#{kpi.balance}">Saldo</div>
    <div th:class="${summary.netBalance.signum() >= 0} ? 'stat-value text-green' : 'stat-value text-red'"
         th:text="${#numbers.formatCurrency(summary.netBalance)}">0,00 €</div>
  </div>
</div>

<div class="grid-2" style="margin-bottom:16px">

  <div class="card">
    <div class="card-head">
      <div class="card-title" th:text="#{reports.dailySales}">Vendas Diárias</div>
      <span class="badge badge-success" th:text="#{reports.approvedBadge}">Aprovadas</span>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(dailySales)}" class="empty" style="padding:24px">
        <div class="empty-icon">📊</div>
        <div class="empty-text" th:text="#{reports.noSales}">Sem vendas no período</div>
      </div>
      <div class="bar-chart" id="dailyChart"
           th:attr="data-bar-chart=${#lists.isEmpty(dailySales)} ? '[]' : dailySalesChartJson"
           data-bar-chart="[]"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title" th:text="#{reports.byCategory}">Por Categoria</div></div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(byCategory)}" class="empty" style="padding:24px">
        <div class="empty-text" th:text="#{reports.noData}">Sem dados no período</div>
      </div>
      <div th:each="c : ${byCategory}" class="progress-row">
        <div class="progress-label">
          <span th:text="${c.category}">Cat</span>
          <span style="color:var(--accent);font-weight:700"
                th:text="${#numbers.formatCurrency(c.total)} + ' (' + ${c.pct} + '%)'"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"
               th:style="'width:' + ${c.pct} + '%;background:var(--accent)'"></div>
        </div>
        <div class="text-muted" style="font-size:11px;margin-top:2px"
             th:text="${c.count} + ' ' + #{lbl.records}"></div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><div class="card-title" th:text="#{reports.byEmployee}">Performance por Funcionário</div></div>
  <div class="card-body">
    <div th:if="${#lists.isEmpty(byEmployee)}" class="empty">
      <div class="empty-icon">👥</div>
      <div class="empty-text" th:text="#{reports.noEmployees}">Sem dados aprovados no período</div>
    </div>
    <div class="table-wrap" th:if="${not #lists.isEmpty(byEmployee)}">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th th:text="#{lbl.employee}">Funcionário</th>
            <th th:text="#{lbl.total}">Volume</th>
            <th th:text="#{lbl.records}">Registros</th>
            <th th:text="#{lbl.hours}">Horas</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="emp,i : ${byEmployee}">
            <td><span th:text="${i.index == 0} ? '🏆' : ${i.index + 1}"></span></td>
            <td class="fw-bold" th:text="${emp.name}">Nome</td>
            <td class="fw-bold text-green" th:text="${#numbers.formatCurrency(emp.total)}">0,00 €</td>
            <td th:text="${emp.count}">0</td>
            <td class="text-muted" th:text="${emp.hours} + 'h'">0h</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>


</content>
</th:block>
</body>
</html>
