<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.templates}, content=~{::content})}">
<content>

<div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>✅ <span th:text="${successMsg}"></span></div>
<div th:if="${errorMsg}"   class="alert alert-danger"  data-auto-dismiss>⚠️ <span th:text="${errorMsg}"></span></div>

<div class="grid-2" style="align-items:start">

  <div class="card fade-in">
    <div class="card-head">
      <div class="card-title" th:text="#{manager.templates.title}">Templates criados</div>
      <span class="badge badge-primary" th:text="${#lists.size(templates)} + ' ' + #{lbl.records}"></span>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(templates)}" class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text" th:text="#{manager.templates.none}">Nenhum formulário ainda</div>
      </div>
      <div th:each="t : ${templates}"
           style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1">
          <div class="fw-bold" th:text="${t.name}"></div>
          <div class="text-muted" style="font-size:12px" th:text="${t.description ?: '—'}"></div>
          <div style="margin-top:4px;font-size:11px;color:var(--muted)">
            <span th:text="${#lists.size(t.fields)} + ' ' + #{lbl.records}"></span>
          </div>
        </div>
        <span th:if="${t.active}"   class="badge badge-success"  th:text="#{manager.templates.active}">Ativo</span>
        <span th:unless="${t.active}" class="badge badge-warning" th:text="#{manager.templates.inactive}">Inativo</span>
        <a th:href="@{/manager/templates/{id}(id=${t.id})}" class="btn btn-sm btn-outline" th:text="#{btn.view}">Editar</a>
        <form th:action="@{/manager/templates/{id}/delete(id=${t.id})}" method="post" style="margin:0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-sm btn-danger"
                  th:attr="data-confirm=|Eliminar o formulário '${t.name}' e todos os seus registos? Esta ação não pode ser desfeita.|">
            🗑
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="card fade-in d2">
    <div class="card-head">
      <div class="card-title" th:text="#{manager.templates.createNew}">Criar novo formulário</div>
    </div>
    <div class="card-body">
      <form th:action="@{/manager/templates}" method="post" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label" th:text="#{manager.templates.formName}">Nome do formulário</label>
          <input type="text" th:field="*{name}" class="form-control"
                 th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                 th:placeholder="#{manager.templates.formNamePh}"/>
          <div th:if="${#fields.hasErrors('name')}" class="form-error" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
          <label class="form-label" th:text="#{lbl.description}">Descrição (opcional)</label>
          <textarea th:field="*{description}" class="form-control" rows="3"
                    th:placeholder="#{manager.templates.descPh}"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-w" th:text="#{manager.templates.createBtn}">📋 Criar Formulário</button>
      </form>
    </div>
  </div>

</div>
</content>
</th:block>
</body>
</html>
