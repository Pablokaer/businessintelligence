<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.home}, content=~{::content})}">
<content>

<div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>✅ <span th:text="${successMsg}"></span></div>

<div class="stats-grid">
  <div class="stat-card fade-in d1">
    <div class="stat-icon">✅</div>
    <div class="stat-label" th:text="#{kpi.approvedVolume}">Volume Aprovado</div>
    <div class="stat-value text-green"
         th:text="${#numbers.formatCurrency(summary.totalSales.add(summary.totalServices))}">0,00 €</div>
    <div class="stat-delta" th:text="#{kpi.currentMonth}">mês atual</div>
  </div>
  <div class="stat-card fade-in d2">
    <div class="stat-icon">⏳</div>
    <div class="stat-label" th:text="#{kpi.pending}">Pendentes</div>
    <div class="stat-value text-yellow" th:text="${summary.pendingCount}">0</div>
    <div class="stat-delta" th:text="#{kpi.pendingReview}">aguardando revisão</div>
  </div>
  <div class="stat-card fade-in d3">
    <div class="stat-icon">📤</div>
    <div class="stat-label" th:text="#{kpi.expenses}">Despesas</div>
    <div class="stat-value text-red"
         th:text="${#numbers.formatCurrency(summary.totalExpenses)}">0,00 €</div>
    <div class="stat-delta" th:text="#{kpi.currentMonth}">mês atual</div>
  </div>
  <div class="stat-card fade-in d4">
    <div class="stat-icon">📋</div>
    <div class="stat-label" th:text="#{kpi.approved}">Aprovados</div>
    <div class="stat-value text-accent" th:text="${summary.approvedCount}">0</div>
    <div class="stat-delta" th:text="#{kpi.approvedThisMonth}">no mês atual</div>
  </div>
</div>

<div class="grid-2">

  <div class="card fade-in d2">
    <div class="card-head">
      <div class="card-title" th:text="#{employee.dashboard.recentActivity}">Atividade Recente</div>
      <a th:href="@{/employee/submissions}" class="btn btn-ghost btn-sm" th:text="#{employee.dashboard.seeAll}">Ver todos</a>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(recentSubmissions)}" class="empty">
        <div class="empty-icon">📝</div>
        <div class="empty-text" th:text="#{employee.dashboard.noRecords}">Nenhum registro ainda</div>
        <div style="margin-top:12px">
          <a th:href="@{/employee/submissions/new}" class="btn btn-primary btn-sm"
             th:text="#{employee.dashboard.createFirst}">Criar primeiro registro</a>
        </div>
      </div>
      <div th:each="s : ${recentSubmissions}"
           style="padding:12px 0;border-bottom:1px solid var(--border)">
        <div class="flex items-center gap-1" style="margin-bottom:4px">
          <span th:class="'badge badge-' + ${s.type.badgeClass}"
                th:text="${s.type.icon} + ' ' + ${s.type.label}"></span>
          <span class="td-mono" style="font-size:12px" th:text="${s.formNumber}"></span>
          <span th:class="'badge badge-' + ${s.status.badgeClass}"
                th:text="${s.status.label}" style="margin-left:auto"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-muted" style="font-size:12px" th:text="${s.description}"></span>
          <span class="fw-bold text-green" th:text="${#numbers.formatCurrency(s.value)}"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card fade-in d3">
    <div class="card-head"><div class="card-title" th:text="#{employee.dashboard.goals}">Metas do Mês</div></div>
    <div class="card-body">

      <div class="progress-row">
        <div class="progress-label">
          <span th:text="#{employee.dashboard.salesGoal}">Vendas vs. Meta (R$ 5.000)</span>
          <span th:style="${summary.totalSales.compareTo(T(java.math.BigDecimal).valueOf(5000.0)) >= 0} ? 'color:var(--green);font-weight:700' : ''"
                th:text="${#numbers.formatCurrency(summary.totalSales)}"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"
               th:style="'width:' + ${T(java.lang.Math).min(summary.totalSales.multiply(T(java.math.BigDecimal).valueOf(100.0)).divide(T(java.math.BigDecimal).valueOf(5000.0),0,T(java.math.RoundingMode).HALF_UP).intValue(), 100)} + '%;background:var(--green)'"></div>
        </div>
      </div>

      <div class="progress-row">
        <div class="progress-label">
          <span th:text="#{employee.dashboard.approvalRate}">Aprovações vs. Total</span>
          <span th:text="${summary.approvedCount} + ' ' + #{employee.dashboard.approved}"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"
               th:style="'width:' + ${(summary.approvedCount + summary.pendingCount) > 0 ? T(java.lang.Math).round(summary.approvedCount * 100.0 / (summary.approvedCount + summary.pendingCount)) : 0} + '%;background:var(--accent)'"></div>
        </div>
      </div>

      <hr class="divider"/>

      <a th:href="@{/employee/submissions/new}" class="btn btn-primary btn-w"
         th:text="#{employee.dashboard.newForm}">✏️ Novo Formulário</a>
    </div>
  </div>

</div>
</content>
</th:block>
</body>
</html>
