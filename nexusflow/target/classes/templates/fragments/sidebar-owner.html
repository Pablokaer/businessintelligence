<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="sidebar" id="sidebar" class="sidebar">
  <div class="sidebar-logo">Nexus<span>Flow</span></div>

  <div class="nav-section">
    <div class="nav-label">Main</div>
    <a th:href="@{/manager/dashboard}"
       th:classappend="${activeMenu == 'dashboard'} ? 'active'" class="nav-item">
      <div class="nav-icon">📊</div> <span>Dashboard</span>
    </a>
    <a th:href="@{/manager/submissions}"
       th:classappend="${activeMenu == 'submissions'} ? 'active'" class="nav-item">
      <div class="nav-icon">📋</div> <span>Records</span>
      <span th:if="${pendingCount != null and pendingCount > 0}" class="nav-badge"
            th:text="${pendingCount}"></span>
    </a>
    <a th:href="@{/manager/employees}"
       th:classappend="${activeMenu == 'employees'} ? 'active'" class="nav-item">
      <div class="nav-icon">👥</div> <span>Team</span>
    </a>
    <a th:href="@{/manager/templates}"
       th:classappend="${activeMenu == 'templates'} ? 'active'" class="nav-item">
      <div class="nav-icon">🔧</div> <span>Forms</span>
    </a>
    <a th:href="@{/manager/form-submissions}"
       th:classappend="${activeMenu == 'form-submissions'} ? 'active'" class="nav-item">
      <div class="nav-icon">📂</div> <span>Service Records</span>
    </a>
    <a th:href="@{/manager/reports}"
       th:classappend="${activeMenu == 'reports'} ? 'active'" class="nav-item">
      <div class="nav-icon">📈</div> <span>Reports</span>
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" th:text="${#authentication?.principal?.initials}">XX</div>
      <div>
        <div class="user-name" th:text="${#authentication?.principal?.name}">User</div>
        <div class="user-role">Owner</div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin-left:auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn" title="Sair">⏻</button>
      </form>
    </div>
  </div>
</nav>
</html>
