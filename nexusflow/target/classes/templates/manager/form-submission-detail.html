<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page(title=#{nav.serviceRecords}, content=~{::content})}">
<content>

<div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss>✅ <span th:text="${successMsg}"></span></div>
<div th:if="${errorMsg}"   class="alert alert-danger"  data-auto-dismiss>⚠️ <span th:text="${errorMsg}"></span></div>

<div class="grid-2" style="align-items:start">

  <div>
    <div class="card fade-in" style="margin-bottom:16px">
      <div class="card-head">
        <div class="card-title" th:text="#{manager.formSub.info}">Informações do Registro</div>
        <span th:class="'badge badge-' + ${submission.status.badgeClass}" th:text="${submission.status.label}"></span>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div>
            <div class="text-muted" style="font-size:12px" th:text="#{lbl.form}">Formulário</div>
            <div class="fw-bold" th:text="${submission.template.name}"></div>
          </div>
          <div>
            <div class="text-muted" style="font-size:12px" th:text="#{lbl.employee}">Funcionário</div>
            <div class="fw-bold" th:text="${submission.submittedBy.name}"></div>
          </div>
          <div>
            <div class="text-muted" style="font-size:12px" th:text="#{lbl.date}">Data de Ocorrência</div>
            <div class="fw-bold" th:text="${#temporals.format(submission.occurrenceDate,'dd/MM/yyyy')}"></div>
          </div>
          <div>
            <div class="text-muted" style="font-size:12px" th:text="#{manager.formSub.sentAt}">Enviado em</div>
            <div th:text="${#temporals.format(submission.createdAt,'dd/MM/yyyy HH:mm')}"></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
          <div class="stat-card" style="padding:12px">
            <div class="stat-label" th:text="#{lbl.cost}">Custo</div>
            <div class="stat-value text-red" style="font-size:18px"
                 th:text="${#numbers.formatCurrency(submission.serviceCost)}"></div>
          </div>
          <div class="stat-card" style="padding:12px">
            <div class="stat-label" th:text="#{lbl.hours}">Horas</div>
            <div class="stat-value text-accent" style="font-size:18px"
                 th:text="${submission.serviceHours} + 'h'"></div>
          </div>
          <div class="stat-card" style="padding:12px">
            <div class="stat-label" th:text="#{lbl.value}">Valor</div>
            <div class="stat-value text-green" style="font-size:18px"
                 th:text="${#numbers.formatCurrency(submission.serviceValue)}"></div>
          </div>
        </div>

        <div th:if="${submission.notes}" style="margin-bottom:16px">
          <div class="text-muted" style="font-size:12px;margin-bottom:4px" th:text="#{lbl.notes}">Observações</div>
          <div style="background:var(--surface2);padding:12px;border-radius:8px;white-space:pre-wrap"
               th:text="${submission.notes}"></div>
        </div>

        <div th:if="${!#lists.isEmpty(submission.responses)}">
          <div class="text-muted" style="font-size:12px;margin-bottom:8px" th:text="#{manager.formSub.customFields}">Campos personalizados</div>
          <div th:each="r : ${submission.responses}"
               style="padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:12px;color:var(--muted)" th:text="${r.field.label}"></div>
            <div class="fw-bold" th:text="${r.response ?: '—'}"></div>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${submission.reviewedBy != null}" class="card fade-in">
      <div class="card-head"><div class="card-title" th:text="#{manager.submission.review}">Revisão</div></div>
      <div class="card-body">
        <div style="font-size:13px">
          <span th:text="#{manager.formSub.reviewedBy}">Reviewed by</span>
          <strong th:text="${submission.reviewedBy.name}"></strong>
          on <span th:text="${#temporals.format(submission.reviewedAt,'dd/MM/yyyy HH:mm')}"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card fade-in" th:if="${submission.status.name() == 'PENDING'}">
    <div class="card-head"><div class="card-title" th:text="#{manager.formSub.reviewForm}">Revisar Registro</div></div>
    <div class="card-body">
      <form th:action="@{/manager/form-submissions/{id}/review(id=${submission.id})}"
            method="post" th:object="${reviewForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label" th:text="#{manager.submission.decision}">Decisão</label>
          <select th:field="*{status}" class="form-control">
            <option value="" th:text="#{lbl.all}">Selecione...</option>
            <option th:each="s : ${statuses}"
                    th:if="${s.name() != 'PENDING'}"
                    th:value="${s}" th:text="${s.label}"></option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" th:text="#{lbl.notes}">Observação (opcional)</label>
          <textarea th:field="*{notes}" class="form-control" rows="3"
                    th:placeholder="#{manager.submission.justification}"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-w" th:text="#{manager.formSub.confirmReview}">Confirmar Revisão</button>
      </form>
    </div>
  </div>

  <div class="card fade-in" th:unless="${submission.status.name() == 'PENDING'}">
    <div class="card-body" style="text-align:center;padding:32px">
      <div style="font-size:32px;margin-bottom:8px"
           th:text="${submission.status.name() == 'APPROVED'} ? '✅' : '❌'"></div>
      <div class="fw-bold"
           th:text="${submission.status.name() == 'APPROVED'} ? #{manager.formSub.approvedTitle} : #{manager.formSub.rejectedTitle}"></div>
    </div>
  </div>

</div>

<div style="margin-top:16px">
  <a th:href="@{/manager/form-submissions}" class="btn btn-outline" th:text="#{btn.back}">← Voltar</a>
</div>

</content>
</th:block>
</body>
</html>
